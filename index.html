<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="旅先クイズ会">
<meta name="theme-color" content="#ffffff">
<title>旅先クイズ会 — 参加者記録</title>
<link rel="manifest" href="manifest.json">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root {
    --blue: #1a73e8;
    --blue-light: #e8f0fe;
    --blue-dark: #1557b0;
    --green: #34a853;
    --gray-100: #f8f9fa;
    --gray-200: #e8eaed;
    --gray-500: #9aa0a6;
    --gray-700: #5f6368;
    --gray-900: #202124;
    --red: #ea4335;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; background: var(--gray-100); color: var(--gray-900); min-height: 100dvh; }
  .topbar { background: #fff; border-bottom: 1px solid var(--gray-200); padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  .topbar-title { font-size: 17px; font-weight: 600; }
  .topbar-count { background: var(--blue-light); color: var(--blue); font-size: 13px; font-weight: 600; padding: 4px 12px; border-radius: 99px; }
  .tabs { display: flex; background: #fff; border-bottom: 1px solid var(--gray-200); }
  .tab { flex: 1; padding: 13px 0; text-align: center; font-size: 14px; font-weight: 500; color: var(--gray-500); border: none; background: none; cursor: pointer; border-bottom: 3px solid transparent; transition: all .15s; }
  .tab.active { color: var(--blue); border-bottom-color: var(--blue); }
  .page { display: none; padding: 16px; }
  .page.active { display: block; }

  /* Form */
  .section-card { background: #fff; border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
  .section-title { font-size: 12px; font-weight: 600; color: var(--gray-500); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 12px; }
  .btn-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .opt-btn { background: var(--gray-100); border: 1.5px solid var(--gray-200); border-radius: 99px; padding: 9px 18px; font-size: 15px; color: var(--gray-700); cursor: pointer; transition: all .12s; font-family: inherit; }
  .opt-btn.sel { background: var(--blue-light); border-color: var(--blue); color: var(--blue); font-weight: 600; }
  .age-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .age-grid .opt-btn { padding: 9px 0; text-align: center; border-radius: var(--radius-sm); }
  .region-sub { font-size: 12px; color: var(--gray-500); margin-bottom: 8px; margin-top: 12px; }

  /* Drum picker */
  .count-card { background: #fff; border-radius: var(--radius); padding: 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 16px; }
  .count-card-label { font-size: 12px; font-weight: 600; color: var(--gray-500); text-transform: uppercase; letter-spacing: .06em; flex: 1; }
  .drum-wrap { position: relative; width: 90px; height: 120px; overflow: hidden; cursor: grab; user-select: none; -webkit-user-select: none; }
  .drum-fade-top { position: absolute; top: 0; left: 0; right: 0; height: 40px; background: linear-gradient(to bottom, rgba(255,255,255,1), rgba(255,255,255,0)); z-index: 2; pointer-events: none; }
  .drum-fade-bot { position: absolute; bottom: 0; left: 0; right: 0; height: 40px; background: linear-gradient(to top, rgba(255,255,255,1), rgba(255,255,255,0)); z-index: 2; pointer-events: none; }
  .drum-selector { position: absolute; top: 40px; left: 4px; right: 4px; height: 40px; border-top: 2px solid var(--blue); border-bottom: 2px solid var(--blue); border-radius: 6px; background: var(--blue-light); z-index: 1; pointer-events: none; }
  .drum-list { position: absolute; left: 0; right: 0; top: 0; z-index: 3; }
  .drum-item { height: 40px; display: flex; align-items: center; justify-content: center; font-size: 17px; color: var(--gray-500); }
  .drum-item.active { color: var(--blue); font-weight: 700; font-size: 19px; }
  .drum-count-label { font-size: 15px; color: var(--gray-700); }

  .add-btn { width: 100%; background: var(--blue); color: #fff; border: none; border-radius: var(--radius); padding: 16px; font-size: 16px; font-weight: 600; font-family: inherit; cursor: pointer; margin-top: 4px; transition: background .12s; }
  .add-btn:active { background: var(--blue-dark); }
  .add-btn:disabled { background: var(--gray-200); color: var(--gray-500); cursor: not-allowed; }
  .clear-btn { width: 100%; background: none; border: 1.5px solid var(--gray-200); border-radius: var(--radius); padding: 12px; font-size: 14px; color: var(--gray-700); font-family: inherit; cursor: pointer; margin-top: 8px; }

  /* Stats */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .stat-card { background: #fff; border-radius: var(--radius); padding: 14px 16px; }
  .stat-label { font-size: 12px; color: var(--gray-500); margin-bottom: 4px; }
  .stat-val { font-size: 28px; font-weight: 700; }
  .stat-card.wide { grid-column: span 2; }
  .breakdown-card { background: #fff; border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
  .breakdown-title { font-size: 13px; font-weight: 600; color: var(--gray-700); margin-bottom: 12px; }
  .bar-row { margin-bottom: 10px; }
  .bar-label { display: flex; justify-content: space-between; font-size: 13px; color: var(--gray-700); margin-bottom: 4px; }
  .bar-track { height: 8px; background: var(--gray-200); border-radius: 99px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--blue); border-radius: 99px; transition: width .4s ease; }

  /* Log */
  .log-empty { text-align: center; padding: 48px 16px; color: var(--gray-500); font-size: 15px; }
  .log-empty svg { margin-bottom: 12px; opacity: .4; }
  .entry-card { background: #fff; border-radius: var(--radius); padding: 14px 16px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; }
  .entry-num { width: 32px; height: 32px; border-radius: 50%; background: var(--blue-light); color: var(--blue); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
  .entry-info { flex: 1; }
  .entry-main { font-size: 15px; font-weight: 500; }
  .entry-sub { font-size: 13px; color: var(--gray-500); margin-top: 2px; }
  .icon-btn { background: none; border: none; color: var(--gray-500); cursor: pointer; padding: 6px; border-radius: 50%; }
  .icon-btn.edit:active { background: var(--blue-light); color: var(--blue); }
  .icon-btn.del:active { background: #fce8e6; color: var(--red); }

  /* Publish */
  .publish-btn { width: 100%; background: var(--green); color: #fff; border: none; border-radius: var(--radius); padding: 16px; font-size: 16px; font-weight: 600; font-family: inherit; cursor: pointer; margin-bottom: 12px; transition: background .12s; }
  .publish-btn:active { background: #2d9249; }
  .publish-btn:disabled { background: var(--gray-200); color: var(--gray-500); cursor: not-allowed; }
  .publish-note { font-size: 13px; color: var(--gray-500); text-align: center; line-height: 1.6; }

  /* Edit modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 50; align-items: flex-end; }
  .modal-overlay.open { display: flex; }
  .modal-sheet { background: #fff; border-radius: 20px 20px 0 0; padding: 20px 16px 40px; width: 100%; max-height: 90dvh; overflow-y: auto; }
  .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; text-align: center; }
  .modal-sub { font-size: 13px; color: var(--gray-500); text-align: center; margin-bottom: 16px; }
  .modal-sec { font-size: 12px; font-weight: 600; color: var(--gray-500); text-transform: uppercase; letter-spacing:.06em; margin-bottom: 8px; margin-top: 16px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .modal-save { flex: 1; background: var(--blue); color: #fff; border: none; border-radius: var(--radius); padding: 14px; font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer; }
  .modal-cancel { background: none; border: 1.5px solid var(--gray-200); border-radius: var(--radius); padding: 14px 20px; font-size: 15px; color: var(--gray-700); font-family: inherit; cursor: pointer; }

  /* Toast */
  .toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(8px); background: rgba(32,33,36,.9); color: #fff; padding: 10px 20px; border-radius: 99px; font-size: 14px; opacity: 0; transition: all .25s; pointer-events: none; white-space: nowrap; z-index: 100; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">旅先クイズ会</div>
  <div class="topbar-count"><span id="hdr-count">0</span> 名</div>
</div>

<div class="tabs">
  <button class="tab active" onclick="showTab('record')">記録</button>
  <button class="tab" onclick="showTab('stats')">集計</button>
  <button class="tab" onclick="showTab('log')">ログ</button>

</div>

<!-- 記録タブ -->
<div class="page active" id="page-record">
  <div class="section-card">
    <div class="section-title">1. 性別</div>
    <div class="btn-row" id="g-gender">

  <div class="section-card">

    <div class="age-grid" id="g-age">
      <button class="opt-btn" data-val="10代">10代</button>
      <button class="opt-btn" data-val="20代">20代</button>
      <button class="opt-btn" data-val="30代">30代</button>
      <button class="opt-btn" data-val="40代">40代</button>
      <button class="opt-btn" data-val="50代">50代</button>
      <button class="opt-btn" data-val="60代">60代</button>
      <button class="opt-btn" data-val="70代以上">70代以上</button>
    </div>
  </div>

  <div class="section-card">
    <div class="section-title">3. 国・地域</div>
    <div class="region-sub">国内</div>
    <div class="btn-row" id="g-region-dom">
      <button class="opt-btn" data-val="日本国内">日本国内</button>
    </div>
    <div class="region-sub">海外</div>
    <div class="btn-row" id="g-region-ovs">
      <button class="opt-btn" data-val="アジア・オセアニア">アジア・オセアニア</button>
      <button class="opt-btn" data-val="欧州">欧州</button>
      <button class="opt-btn" data-val="北米">北米</button>
      <button class="opt-btn" data-val="中南米">中南米</button>

    <div class="drum-wrap" id="drum-wrap">

<!-- 集計タブ -->
<div class="page" id="page-stats">
  <div class="stats-grid">
    <div class="stat-card wide"><div class="stat-label">合計参加者</div><div class="stat-val" id="s-total">0</div></div>
    <div class="stat-card"><div class="stat-label">男性</div><div class="stat-val" id="s-male">0</div></div>
    <div class="stat-card"><div class="stat-label">女性</div><div class="stat-val" id="s-female">0</div></div>
    <div class="stat-card"><div class="stat-label">日本国内</div><div class="stat-val" id="s-dom">0</div></div>
    <div class="stat-card"><div class="stat-label">海外</div><div class="stat-val" id="s-ovs">0</div></div>
  </div>
  <div class="breakdown-card"><div class="breakdown-title">年代別</div><div id="age-bars"></div></div>
  <div class="breakdown-card"><div class="breakdown-title">地域別</div><div id="region-bars"></div></div>
</div>

<!-- ログタブ -->
<div class="page" id="page-log">
  <div id="log-list">
    <div class="log-empty">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
      <div>まだ記録がありません</div>
    </div>
  </div>
</div>

<!-- 発行タブ -->
<div class="page" id="page-publish">
  <div class="section-card" style="margin-bottom:16px">
    <div class="stat-label" style="margin-bottom:4px">記録済み参加者</div>
    <div style="font-size:32px;font-weight:700;" id="p-count">0 名</div>
  </div>
  <button class="publish-btn" id="publish-btn" disabled onclick="publishPDF()">📄 PDFを発行する</button>
  <button class="publish-btn" id="csv-btn" disabled onclick="publishCSV()" style="background:#1a73e8">📊 CSVをダウンロードする</button>
  <div class="publish-note">PDFは集計サマリー＋参加者一覧を含みます。<br>CSVはExcel等で開ける表形式データです。<br><br>記録データはこのページを閉じても<br>端末に保存されます。</div>
  <div style="margin-top:24px;border-top:1px solid var(--gray-200);padding-top:16px;">
    <button class="clear-btn" style="color:var(--red);border-color:var(--red)" onclick="clearAll()">すべてのデータを削除する</button>
  </div>
</div>

<!-- 編集モーダル -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal-sheet">
    <div class="modal-title">記録を修正する</div>
    <div class="modal-sub" id="edit-sub"></div>
    <div class="modal-sec">1. 性別</div>
    <div class="btn-row" id="e-gender">
      <button class="opt-btn" data-val="男">男</button>
      <button class="opt-btn" data-val="女">女</button>
    </div>
    <div class="modal-sec">2. 年代</div>
    <div class="age-grid" id="e-age">
      <button class="opt-btn" data-val="10代">10代</button>
      <button class="opt-btn" data-val="20代">20代</button>
      <button class="opt-btn" data-val="30代">30代</button>
      <button class="opt-btn" data-val="40代">40代</button>
      <button class="opt-btn" data-val="50代">50代</button>
      <button class="opt-btn" data-val="60代">60代</button>
      <button class="opt-btn" data-val="70代以上">70代以上</button>
    </div>
    <div class="modal-sec">3. 国・地域</div>
    <div style="font-size:12px;color:var(--gray-500);margin-bottom:6px">国内</div>
    <div class="btn-row" id="e-region-dom">
      <button class="opt-btn" data-val="日本国内">日本国内</button>
    </div>
    <div style="font-size:12px;color:var(--gray-500);margin-bottom:6px;margin-top:8px">海外</div>
    <div class="btn-row" id="e-region-ovs">
      <button class="opt-btn" data-val="アジア・オセアニア">アジア・オセアニア</button>
      <button class="opt-btn" data-val="欧州">欧州</button>
      <button class="opt-btn" data-val="北米">北米</button>
      <button class="opt-btn" data-val="中南米">中南米</button>
      <button class="opt-btn" data-val="中東・アフリカ">中東・アフリカ</button>
    </div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeEdit()">キャンセル</button>
      <button class="modal-save" onclick="saveEdit()">保存する</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const AGES = ['10代','20代','30代','40代','50代','60代','70代以上'];
const REGIONS_ALL = ['日本国内','アジア・オセアニア','欧州','北米','中南米','中東・アフリカ'];

let sel = {gender:null, age:null, region:null};
let selCount = 1;
let entries = JSON.parse(localStorage.getItem('tqk_entries') || '[]');
let editingId = null;
let editSel = {gender:null, age:null, region:null};

// Tab switching
function showTab(id) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['record','stats','log','publish'][i]===id);
  });
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  if(id==='stats') renderStats();
  if(id==='log') renderLog();
  if(id==='publish') renderPublish();
}

// Drum picker
(function() {
  const ITEM_H = 40;
  const VISIBLE = 3; // items visible (top/center/bottom)
  const CENTER = 1;  // index of center row in visible area = 1
  const COUNT = 20;
  let idx = 0; // currently selected index (0-based => value idx+1)
  let dragStartY = 0, dragStartIdx = 0, dragging = false;

  function clamp(n) { return Math.max(0, Math.min(COUNT - 1, n)); }

  function setIdx(n, animate) {
    idx = clamp(n);
    selCount = idx + 1;
    const list = document.getElementById('drum-list');
    if (!list) return;
    // translateY so that item[idx] sits in the center row
    // center row top = CENTER * ITEM_H = 40px inside the 120px container
    // item[idx] top in list = idx * ITEM_H
    // we want: translateY + idx*ITEM_H = CENTER*ITEM_H  =>  translateY = (CENTER - idx)*ITEM_H
    const ty = (CENTER - idx) * ITEM_H;
    list.style.transition = animate ? 'transform .18s cubic-bezier(.25,.46,.45,.94)' : 'none';
    list.style.transform = 'translateY(' + ty + 'px)';
    list.querySelectorAll('.drum-item').forEach((el, i) => el.classList.toggle('active', i === idx));
  }

  window.initDrum = function() {
    const list = document.getElementById('drum-list');
    const wrap = document.getElementById('drum-wrap');
    if (!list || !wrap) return;
    list.innerHTML = Array.from({length: COUNT}, (_, i) =>
      '<div class="drum-item">' + (i + 1) + '名</div>'
    ).join('');
    setIdx(0, false);

    // touch
    wrap.addEventListener('touchstart', e => {
      dragging = true;
      dragStartY = e.touches[0].clientY;
      dragStartIdx = idx;
      list.style.transition = 'none';
    }, {passive: true});
    wrap.addEventListener('touchmove', e => {
      if (!dragging) return;
      const dy = dragStartY - e.touches[0].clientY; // positive = swipe up = higher number
      const delta = Math.round(dy / ITEM_H);
      const tentative = clamp(dragStartIdx + delta);
      const ty = (CENTER - dragStartIdx) * ITEM_H - (dy - delta * ITEM_H + (tentative - dragStartIdx - delta) * ITEM_H);
      // simpler: just move list freely while dragging
      const rawTy = (CENTER - dragStartIdx) * ITEM_H - dy;
      list.style.transform = 'translateY(' + rawTy + 'px)';
      list.querySelectorAll('.drum-item').forEach((el, i) => el.classList.toggle('active', i === clamp(dragStartIdx + Math.round(dy / ITEM_H))));
    }, {passive: true});
    wrap.addEventListener('touchend', e => {
      if (!dragging) return;
      dragging = false;
      const dy = dragStartY - e.changedTouches[0].clientY;
      setIdx(dragStartIdx + Math.round(dy / ITEM_H), true);
    });

    // mouse
    wrap.addEventListener('mousedown', e => {
      dragging = true; dragStartY = e.clientY; dragStartIdx = idx;
      wrap.style.cursor = 'grabbing';
      list.style.transition = 'none';
      e.preventDefault();
    });
    document.addEventListener('mousemove', e => {
      if (!dragging) return;
      const dy = dragStartY - e.clientY;
      const rawTy = (CENTER - dragStartIdx) * ITEM_H - dy;
      list.style.transform = 'translateY(' + rawTy + 'px)';
      list.querySelectorAll('.drum-item').forEach((el, i) => el.classList.toggle('active', i === clamp(dragStartIdx + Math.round(dy / ITEM_H))));
    });
    document.addEventListener('mouseup', e => {
      if (!dragging) return;
      dragging = false;
      wrap.style.cursor = 'grab';
      const dy = dragStartY - e.clientY;
      setIdx(dragStartIdx + Math.round(dy / ITEM_H), true);
    });
  };

  window.resetDrum = function() { setIdx(0, true); selCount = 1; };
})();

// Option buttons
function setupGroup(groupId, key, store, allowCross, altGroups) {
  document.getElementById(groupId).querySelectorAll('.opt-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if(allowCross && altGroups) {
        altGroups.forEach(g => document.getElementById(g).querySelectorAll('.opt-btn').forEach(b => b.classList.remove('sel')));
      } else {
        document.getElementById(groupId).querySelectorAll('.opt-btn').forEach(b => b.classList.remove('sel'));
      }
      btn.classList.add('sel');
      store[key] = btn.dataset.val;
      checkReady();
    });
  });
}

function checkReady() {
  document.getElementById('add-btn').disabled = !(sel.gender && sel.age && sel.region);
}

function addEntry() {
  const ts = new Date().toISOString();
  for(let i = 0; i < selCount; i++) {
    entries.push({id: Date.now() + i, gender: sel.gender, age: sel.age, region: sel.region, ts});
  }
  save();
  updateHeader();
  const msg = selCount > 1
    ? '記録しました — ' + sel.gender + '・' + sel.age + '・' + sel.region + ' ×' + selCount + '名'
    : '記録しました — ' + sel.gender + '・' + sel.age + '・' + sel.region;
  showToast(msg);
  resetForm();
}

function resetForm() {
  sel = {gender:null, age:null, region:null};
  selCount = 1;
  document.querySelectorAll('#page-record .opt-btn').forEach(b => b.classList.remove('sel'));
  resetDrum();
  checkReady();
}

function deleteEntry(id) {
  if(!confirm('この記録を削除しますか？')) return;
  entries = entries.filter(e => e.id !== id);
  save(); updateHeader(); renderLog();
}

function openEdit(id) {
  const e = entries.find(x => x.id === id);
  if(!e) return;
  editingId = id;
  editSel = {gender: e.gender, age: e.age, region: e.region};
  document.getElementById('edit-sub').textContent = '記録 #' + (entries.findIndex(x=>x.id===id)+1);
  // Set selections
  document.querySelectorAll('#e-gender .opt-btn').forEach(b => b.classList.toggle('sel', b.dataset.val === e.gender));
  document.querySelectorAll('#e-age .opt-btn').forEach(b => b.classList.toggle('sel', b.dataset.val === e.age));
  document.querySelectorAll('#e-region-dom .opt-btn, #e-region-ovs .opt-btn').forEach(b => b.classList.toggle('sel', b.dataset.val === e.region));
  document.getElementById('edit-modal').classList.add('open');
}

function closeEdit() {
  document.getElementById('edit-modal').classList.remove('open');
  editingId = null;
}

function saveEdit() {
  if(!editSel.gender || !editSel.age || !editSel.region) { showToast('すべての項目を選んでください'); return; }
  const idx = entries.findIndex(e => e.id === editingId);
  if(idx >= 0) {
    entries[idx].gender = editSel.gender;
    entries[idx].age = editSel.age;
    entries[idx].region = editSel.region;
  }
  save(); updateHeader(); renderLog();
  closeEdit();
  showToast('修正しました');
}

function clearAll() {
  if(!confirm('すべての記録を削除しますか？この操作は元に戻せません。')) return;
  entries = []; save(); updateHeader(); renderLog(); renderPublish();
  showToast('データを削除しました');
}

function save() { localStorage.setItem('tqk_entries', JSON.stringify(entries)); }
function updateHeader() { document.getElementById('hdr-count').textContent = entries.length; }

function renderLog() {
  const list = document.getElementById('log-list');
  if(entries.length === 0) {
    list.innerHTML = `<div class="log-empty"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg><div>まだ記録がありません</div></div>`;
    return;
  }
  list.innerHTML = entries.slice().reverse().map((e,i) => {
    const num = entries.length - i;
    return `<div class="entry-card">
      <div class="entry-num">${num}</div>
      <div class="entry-info">
        <div class="entry-main">${e.gender}・${e.age}</div>
        <div class="entry-sub">${e.region}</div>
      </div>
      <button class="icon-btn edit" onclick="openEdit(${e.id})" aria-label="修正">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </button>
      <button class="icon-btn del" onclick="deleteEntry(${e.id})" aria-label="削除">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>
      </button>
    </div>`;
  }).join('');
}

function renderStats() {
  const total = entries.length;
  document.getElementById('s-total').textContent = total;
  document.getElementById('s-male').textContent = entries.filter(e=>e.gender==='男').length;
  document.getElementById('s-female').textContent = entries.filter(e=>e.gender==='女').length;
  document.getElementById('s-dom').textContent = entries.filter(e=>e.region==='日本国内').length;
  document.getElementById('s-ovs').textContent = entries.filter(e=>e.region!=='日本国内').length;
  const ageBars = document.getElementById('age-bars');
  if(!total) { ageBars.innerHTML = '<div style="color:var(--gray-500);font-size:13px">データなし</div>'; }
  else ageBars.innerHTML = AGES.map(a => { const n=entries.filter(e=>e.age===a).length; const p=Math.round(n/total*100); return n?`<div class="bar-row"><div class="bar-label"><span>${a}</span><span>${n}名 (${p}%)</span></div><div class="bar-track"><div class="bar-fill" style="width:${p}%"></div></div></div>`:''; }).join('');
  const regionBars = document.getElementById('region-bars');
  if(!total) { regionBars.innerHTML = '<div style="color:var(--gray-500);font-size:13px">データなし</div>'; }
  else { regionBars.innerHTML = REGIONS_ALL.map(r => { const n=entries.filter(e=>e.region===r).length; const p=Math.round(n/total*100); return n?`<div class="bar-row"><div class="bar-label"><span>${r}</span><span>${n}名 (${p}%)</span></div><div class="bar-track"><div class="bar-fill" style="width:${p}%"></div></div></div>`:''; }).join(''); if(!regionBars.innerHTML) regionBars.innerHTML='<div style="color:var(--gray-500);font-size:13px">データなし</div>'; }
}

function renderPublish() {
  document.getElementById('p-count').textContent = entries.length + ' 名';
  const empty = entries.length === 0;
  document.getElementById('publish-btn').disabled = empty;
  document.getElementById('csv-btn').disabled = empty;
}

function publishCSV() {
  const BOM = '\uFEFF';
  const header = ['番号','性別','年代','国・地域','記録日時'];
  const rows = entries.map((e,i) => [i+1, e.gender, e.age, e.region, new Date(e.ts).toLocaleString('ja-JP')]);
  const csv = BOM + [header,...rows].map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\r\n');
  const blob = new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='tabisaki-'+new Date().toISOString().slice(0,10)+'.csv'; a.click();
  URL.revokeObjectURL(url);
  showToast('CSVをダウンロードしました');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._tid); t._tid = setTimeout(() => t.classList.remove('show'), 2400);
}

function publishPDF() {
  if(typeof window.jspdf === 'undefined') { showToast('PDFライブラリ読み込み中… もう一度タップ'); return; }
  const {jsPDF} = window.jspdf;
  const doc = new jsPDF({orientation:'p',unit:'mm',format:'a4'});
  const now = new Date();
  const dateStr = now.toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'});
  const total = entries.length;
  doc.setFont('helvetica','bold'); doc.setFontSize(20); doc.text('Tabisaki Quiz Kai',20,24);
  doc.setFont('helvetica','normal'); doc.setFontSize(11); doc.setTextColor(100); doc.text('Participant Report  /  '+dateStr,20,32); doc.setTextColor(0);
  doc.setFontSize(13); doc.setFont('helvetica','bold'); doc.text('Summary',20,46); doc.setFont('helvetica','normal'); doc.setFontSize(11);
  const male=entries.filter(e=>e.gender==='男').length, female=entries.filter(e=>e.gender==='女').length;
  const dom=entries.filter(e=>e.region==='日本国内').length, ovs=total-dom;
  const rows=[['Total participants',String(total)],['Male',String(male)+(total?'  ('+Math.round(male/total*100)+'%)':'')],['Female',String(female)+(total?'  ('+Math.round(female/total*100)+'%)':'')],['Domestic',String(dom)],['Overseas',String(ovs)]];
  REGIONS_ALL.filter(r=>r!=='日本国内').forEach(r=>{const n=entries.filter(e=>e.region===r).length;if(n>0)rows.push(['  '+r,String(n)]);});
  rows.push(['---','---']);
  AGES.forEach(a=>{const n=entries.filter(e=>e.age===a).length;if(n>0)rows.push([a,String(n)]);});
  let y=54;
  rows.forEach(([label,val])=>{if(label==='---'){doc.setLineWidth(0.3);doc.line(20,y,190,y);y+=5;return;}doc.text(label,25,y);doc.text(val,130,y);y+=7;});
  y+=6; doc.setFont('helvetica','bold'); doc.setFontSize(13); doc.text('Participant Log',20,y); y+=7;
  doc.setFontSize(10); doc.setFont('helvetica','bold'); doc.text('#',20,y); doc.text('Gender',35,y); doc.text('Age',60,y); doc.text('Region',90,y); y+=4;
  doc.setLineWidth(0.3); doc.line(20,y,190,y); y+=6; doc.setFont('helvetica','normal');
  entries.forEach((e,i)=>{if(y>275){doc.addPage();y=20;}doc.text(String(i+1),20,y);doc.text(e.gender,35,y);doc.text(e.age,60,y);doc.text(e.region,90,y);y+=6;});
  doc.save('tabisaki-'+now.toISOString().slice(0,10)+'.pdf');
  showToast('PDFを発行しました');
}

// Init record form buttons
setupGroup('g-gender','gender',sel,false,null);
setupGroup('g-age','age',sel,false,null);
setupGroup('g-region-dom','region',sel,true,['g-region-dom','g-region-ovs']);
setupGroup('g-region-ovs','region',sel,true,['g-region-dom','g-region-ovs']);

// Init edit modal buttons
setupGroup('e-gender','gender',editSel,false,null);
setupGroup('e-age','age',editSel,false,null);
setupGroup('e-region-dom','region',editSel,true,['e-region-dom','e-region-ovs']);
setupGroup('e-region-ovs','region',editSel,true,['e-region-dom','e-region-ovs']);

initDrum();
updateHeader();
</script>
